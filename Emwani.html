        tailwind.config = {

    <style>
        :root { 
            --bg: #07120E; 
            --text: #F9F7F2; 
            --glass-bg: rgba(11, 33, 26, 0.85);
            --card-bg: rgba(255, 255, 255, 0.03);
            --border: rgba(197, 160, 89, 0.15); 
            --accent: #C5A059;
            --pattern: url("https://www.transparenttextures.com/patterns/carbon-fibre.png");
        }
        
        html.light { 
            --bg: #f2fcf7; 
            --text: #0B211A; 
            --glass-bg: rgba(225, 247, 235, 0.9);
            --card-bg: rgba(11, 33, 26, 0.04);
            --border: rgba(11, 33, 26, 0.1);
            --accent: #1A3C32;
        }

        body { 
            background-color: var(--bg);
            color: var(--text);
            transition: background-color 0.4s ease, color 0.4s ease;
            -webkit-tap-highlight-color: transparent;
            background-image: var(--pattern);
            background-blend-mode: overlay;
        }

        .african-pattern {
            background-image: radial-gradient(var(--border) 1px, transparent 0);
            background-size: 20px 20px;
        }

        .glass-header {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border-bottom: 2px solid var(--border);
        }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-bottom-width: 4px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .glass-card:active { transform: translateY(2px); border-bottom-width: 1px; background: rgba(197, 160, 89, 0.08); }

        .modal-overlay {
            position: fixed;
            inset: 0;
            z-index: 100;
            background: rgba(7, 18, 14, 0.9);
            backdrop-filter: blur(15px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            opacity: 0;
            visibility: hidden;
            transition: 0.3s;
        }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        
        .modal-content {
            background: var(--bg);
            border: 2px solid var(--border);
            border-radius: 40px;
            width: 100%;
            max-width: 440px;
            max-height: 85vh;
            overflow-y: auto;
            transform: scale(0.9) translateY(40px);
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-overlay.active .modal-content { transform: scale(1) translateY(0); }

        .hero-text {
            font-family: 'Bebas Neue', cursive;
            line-height: 0.9;
        }

        .hide-scrollbar::-webkit-scrollbar { display: none; }

        /* Smooth logo transition */
        .brand-logo {
            transition: opacity 0.3s ease;
        }
    </style>
</head>

    <script>
        function toggleTheme() {
            const html = document.documentElement;
            if (html.classList.contains('dark')) {
                html.classList.remove('dark');
                html.classList.add('light');
                localStorage.setItem('theme', 'light');
            } else {
                html.classList.remove('light');
                html.classList.add('dark');
                localStorage.setItem('theme', 'dark');
            }
        }

        const savedTheme = localStorage.getItem('theme') || 'dark';
        if (savedTheme === 'light') {
            document.documentElement.classList.remove('dark');
            document.documentElement.classList.add('light');
        }

                                <textarea placeholder="SHARE YOUR THOUGHTS WITH US..." class="w-full bg-white/5 border border-emwani-gold/20 p-5 rounded-2xl font-display text-lg uppercase outline-none focus:border-emwani-gold h-32 transition-all"></textarea>
                                <button type="submit" class="w-full py-5 bg-emwani-gold text-emwani-forest rounded-2xl font-display text-2xl uppercase tracking-widest shadow-xl">Submit</button>
                            </form>
                        </div>
                    `;
                    break;
            }

            container.innerHTML = html;
            overlay.classList.add('active');
        }

        function closeModal() {
            document.getElementById('modalOverlay').classList.remove('active');
        }
    </script>
</body>
</html>
